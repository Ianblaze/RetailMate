version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: retailmate-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: retailmate
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  springboot-backend:
    image: smart-store-pos:latest
    build: .
    container_name: springboot-backend
    ports:
      - "8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx350m -XX:+UseSerialGC -Djava.net.preferIPv4Stack=true"
      # Railway sets DATABASE_URL, PGURL, etc. Fallback to local postgres container
      DB_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/retailmate}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:5000}
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build:
      context: ./ai-service     # Fixed path: needs to build from the ai-service directory
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "5000:5000"
    environment:
      # Some environments have strict memory limits
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx350m -XX:+UseSerialGC -Djava.net.preferIPv4Stack=true"

volumes:
  postgres_data:
